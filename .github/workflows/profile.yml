name: Profile

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h, offset off the top of the hour
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # let an in-flight refresh finish its commit

permissions:
  contents: read              # generation jobs only read; commit job elevates below

jobs:
  # ---- Parallel generation: one job per (card x theme) ----
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false        # one failing card must not cancel the others
      matrix:
        include:
          - { card: stats,        theme: light, fg: "#1f2328" }
          - { card: stats,        theme: dark,  fg: "#c9d1d9" }
          - { card: languages,    theme: light, fg: "#1f2328" }
          - { card: languages,    theme: dark,  fg: "#c9d1d9" }
          - { card: isocalendar,  theme: light, fg: "#1f2328" }
          - { card: isocalendar,  theme: dark,  fg: "#c9d1d9" }
          - { card: habits,       theme: light, fg: "#1f2328" }
          - { card: habits,       theme: dark,  fg: "#c9d1d9" }
          - { card: achievements, theme: light, fg: "#1f2328" }
          - { card: achievements, theme: dark,  fg: "#c9d1d9" }
          - { card: repositories, theme: light, fg: "#1f2328" }
          - { card: repositories, theme: dark,  fg: "#c9d1d9" }
    steps:
      - name: Stats
        if: ${{ matrix.card == 'stats' }}
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: ${{ matrix.card }}.${{ matrix.theme }}.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: ${{ matrix.fg }} !important; color: ${{ matrix.fg }} !important; }

      - name: Languages
        if: ${{ matrix.card == 'languages' }}
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: ${{ matrix.card }}.${{ matrix.theme }}.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: ${{ matrix.fg }} !important; color: ${{ matrix.fg }} !important; }

      - name: Isocalendar
        if: ${{ matrix.card == 'isocalendar' }}
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: ${{ matrix.card }}.${{ matrix.theme }}.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: ${{ matrix.fg }} !important; color: ${{ matrix.fg }} !important; }

      - name: Habits
        if: ${{ matrix.card == 'habits' }}
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: ${{ matrix.card }}.${{ matrix.theme }}.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: ${{ matrix.fg }} !important; color: ${{ matrix.fg }} !important; }

      - name: Achievements
        if: ${{ matrix.card == 'achievements' }}
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: ${{ matrix.card }}.${{ matrix.theme }}.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: ${{ matrix.fg }} !important; color: ${{ matrix.fg }} !important; }

      - name: Repositories
        if: ${{ matrix.card == 'repositories' }}
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: ${{ matrix.card }}.${{ matrix.theme }}.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_repositories: yes
          plugin_repositories_starred: 4
          plugin_repositories_pinned: 2
          plugin_repositories_order: featured, pinned, starred, random
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: ${{ matrix.fg }} !important; color: ${{ matrix.fg }} !important; }

      # metrics (use_prebuilt_image) writes to /metrics_renders/<filename>, NOT the
      # workspace, when output_action is none. Recover the SVG into the workspace.
      - name: Collect generated SVG into workspace
        run: |
          set -euo pipefail
          mkdir -p assets/metrics
          src="/metrics_renders/${{ matrix.card }}.${{ matrix.theme }}.svg"
          dst="assets/metrics/${{ matrix.card }}.${{ matrix.theme }}.svg"
          echo "Renders dir contents:" && sudo ls -la /metrics_renders || true
          sudo cp "$src" "$dst"
          sudo chown "$(id -u):$(id -g)" "$dst"
          ls -la assets/metrics/

      - name: Upload card artifact
        uses: actions/upload-artifact@v7
        with:
          name: metrics-${{ matrix.card }}-${{ matrix.theme }}
          path: assets/metrics/${{ matrix.card }}.${{ matrix.theme }}.svg
          if-no-files-found: error
          retention-days: 1

  # ---- Parallel generation: contribution snake ----
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate contribution snake (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake/snake.svg
            assets/snake/snake-dark.svg?palette=github-dark

      - name: Upload snake artifact
        uses: actions/upload-artifact@v7
        with:
          name: snake
          path: assets/snake
          if-no-files-found: error
          retention-days: 1

  # ---- Single aggregation commit (avoids parallel push races) ----
  commit:
    needs: [metrics, snake]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Download metrics artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: metrics-*
          path: assets/metrics
          merge-multiple: true

      - name: Download snake artifact
        uses: actions/download-artifact@v8
        with:
          name: snake
          path: assets/snake

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(profile): refresh generated assets [skip ci]"
          file_pattern: "assets/**"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
