name: Profile

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h, offset off the top of the hour
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # let an in-flight refresh finish its commit

permissions:
  contents: write             # required for the auto-commit step

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20        # many metrics steps run sequentially
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true   # needed so the auto-commit step can push

      # ----- Stats -----
      - name: Stats (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/stats.light.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Stats (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/stats.dark.svg
          output_action: none
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Languages -----
      - name: Languages (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/languages.light.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Languages (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/languages.dark.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Isocalendar -----
      - name: Isocalendar (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/isocalendar.light.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Isocalendar (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/isocalendar.dark.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Activity -----
      - name: Activity (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/activity.light.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_visibility: all
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Activity (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/activity.dark.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_visibility: all
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Habits -----
      - name: Habits (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/habits.light.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Habits (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/habits.dark.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Achievements -----
      - name: Achievements (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/achievements.light.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Achievements (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/achievements.dark.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Repositories (top-repos approximation: most-starred) -----
      - name: Repositories (light)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/repositories.light.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_repositories: yes
          plugin_repositories_starred: 4
          plugin_repositories_pinned: 2
          plugin_repositories_order: featured, pinned, starred, random
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #1f2328 !important; color: #1f2328 !important; }

      - name: Repositories (dark)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GH_METRICS_TOKEN }}
          filename: assets/metrics/repositories.dark.svg
          output_action: none
          base: ""
          config_animations: "no"
          config_timezone: Asia/Tokyo
          config_base64: yes
          plugin_repositories: yes
          plugin_repositories_starred: 4
          plugin_repositories_pinned: 2
          plugin_repositories_order: featured, pinned, starred, random
          extras_css: |
            :root, body, svg, foreignObject { background: transparent !important; }
            .background, rect.background { fill: transparent !important; }
            h2, h2.field, .field, text, tspan, .value, th, td { fill: #c9d1d9 !important; color: #c9d1d9 !important; }

      # ----- Contribution snake -----
      - name: Contribution snake (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake/snake.svg
            assets/snake/snake-dark.svg?palette=github-dark

      # ----- Commit everything in one go (only if changed) -----
      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(profile): refresh generated assets [skip ci]"
          file_pattern: "assets/**"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
