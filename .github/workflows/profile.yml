# Refreshes the committed profile cards on a schedule.
#
# Deliberately uses ZERO actions (`uses:`): every past outage of this pipeline
# came from third-party actions (OOM in pacman-contribution-graph, GraphQL
# resource-limit failures in user-statistician). The generator itself runs on
# Node.js built-ins with no npm dependencies, so the scheduled path has no
# third-party code at all.
name: Profile

on:
  schedule:
    - cron: "17 */6 * * *" # offset from the top of the hour (documented high-load window)
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04 # pinned: ubuntu-latest will eventually move to 26.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Select Node.js 24 from the hosted toolcache
        run: |
          set -euo pipefail
          # `|| true` keeps set -e from aborting on a glob miss, so the
          # nodejs.org fallback below stays reachable.
          node_bin="$(ls -d "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}"/node/24.*/x64/bin 2>/dev/null | sort -V | tail -n 1 || true)"
          if [ -z "${node_bin}" ]; then
            echo "Node 24 not in toolcache; falling back to checksum-verified nodejs.org download" >&2
            cd "${RUNNER_TEMP}"
            curl -fsSLO https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt
            tarball="$(grep -o 'node-v24[^ ]*-linux-x64\.tar\.xz' SHASUMS256.txt | head -n 1)"
            curl -fsSLO "https://nodejs.org/dist/latest-v24.x/${tarball}"
            grep " ${tarball}\$" SHASUMS256.txt | sha256sum -c -
            mkdir -p node24
            tar -xJf "${tarball}" -C node24 --strip-components=1
            node_bin="${RUNNER_TEMP}/node24/bin"
          fi
          "${node_bin}/node" --version
          echo "${node_bin}" >> "${GITHUB_PATH}"

      - name: Clone repository
        # x-access-token is the documented username for the installation access
        # token GITHUB_TOKEN is. The credential lives only in this job's
        # ephemeral runner and expires when the job ends.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo

      - name: Generate cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: repo
        run: node src/main.ts

      - name: Commit and push refreshed assets
        # GITHUB_TOKEN pushes never retrigger workflows; [skip ci] is
        # defense-in-depth in case the token type ever changes.
        working-directory: repo
        run: |
          set -euo pipefail
          git add assets
          if git diff --cached --quiet; then
            echo "No asset changes; skipping commit."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(profile): refresh generated cards [skip ci]"
          # The branch can advance while the generator runs (Renovate, manual
          # pushes); rebase the asset commit and retry instead of failing.
          for attempt in 1 2 3; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            echo "Push attempt ${attempt} rejected; rebasing onto the latest ${GITHUB_REF_NAME}" >&2
            git fetch origin "${GITHUB_REF_NAME}"
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                rebase FETCH_HEAD
          done
          echo "Failed to push after 3 attempts" >&2
          exit 1

  keepalive:
    # Public-repo schedules are disabled after 60 days without "repository
    # activity", and GitHub does not document whether bot commits count.
    # Re-enabling the workflow is the documented reset, so do it every run.
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write
    steps:
      - name: Reset the scheduled-workflow inactivity timer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow enable profile.yml --repo "${GITHUB_REPOSITORY}"
