name: Profile

on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h, offset off the top of the hour
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/profile.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read              # least privilege; only the commit job elevates

jobs:
  # ---- Generation: read-only token, third-party actions cannot write to the repo ----
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5   # required by user-statistician (derives owner from the repo)

      # Stats card (light / dark) — github-readme-stats
      - name: Stats (dark)
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca  # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&theme=github_dark
          path: assets/stats.dark.svg
      - name: Stats (light)
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca  # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&hide_border=true&theme=default
          path: assets/stats.light.svg

      # Top languages card (light / dark)
      - name: Top languages (dark)
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca  # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&theme=github_dark
          path: assets/top-langs.dark.svg
      - name: Top languages (light)
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca  # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=8&hide_border=true&theme=default
          path: assets/top-langs.light.svg

      # Streak (light / dark) — GITHUB_TOKEN is enough for public contributions
      - name: Streak (dark)
        uses: DenverCoder1/github-readme-streak-stats@51cfb8879073b4c016ce6286016de0b14d179077  # v1.7.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          options: user=${{ github.repository_owner }}&theme=dark&hide_border=true&disable_animations=true
          path: assets/streak.dark.svg
      - name: Streak (light)
        uses: DenverCoder1/github-readme-streak-stats@51cfb8879073b4c016ce6286016de0b14d179077  # v1.7.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          options: user=${{ github.repository_owner }}&theme=default&hide_border=true&disable_animations=true
          path: assets/streak.light.svg

      # Aggregate overview (cross-repo languages + lifetime totals) — user-statistician, write-only
      - name: Overview stats (light)
        uses: cicirello/user-statistician@6a7e459d1174b5822afa99a7c6acccf376cb2eb1  # v1.25.0
        with:
          commit-and-push: false
          colors: light
          image-file: assets/userstats.light.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Overview stats (dark)
        uses: cicirello/user-statistician@6a7e459d1174b5822afa99a7c6acccf376cb2eb1  # v1.25.0
        with:
          commit-and-push: false
          colors: dark
          image-file: assets/userstats.dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pac-Man contribution graph (write-only; emits both light/dark into dist/)
      - name: Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@d258e3fb01511c1ff4fe6418408ede37b2ad4935  # v5.0.0
        env:
          # Run on Node.js 24: clears the Node 20 deprecation warning and pre-empts
          # the forced migration on June 16th, 2026.
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
          # Raise the V8 heap ceiling above the ~4GB default; SVG generation OOMs
          # under it. The ubuntu-latest runner has 16GB RAM, so 8GB is safe.
          NODE_OPTIONS: --max-old-space-size=8192
        with:
          github_user_name: ${{ github.repository_owner }}
          games: pacman

      - name: Collect Pac-Man SVGs into assets
        run: |
          set -euo pipefail
          mkdir -p assets
          cp dist/pacman-contribution-graph.svg assets/pacman.light.svg
          cp dist/pacman-contribution-graph-dark.svg assets/pacman.dark.svg
          ls -la assets/

      - name: Upload generated assets
        uses: actions/upload-artifact@v7
        with:
          name: generated-assets
          path: assets/
          if-no-files-found: error
          retention-days: 1

  # ---- Commit: the only job with write access; runs only trusted actions ----
  commit:
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: true

      - name: Download generated assets
        uses: actions/download-artifact@v8
        with:
          name: generated-assets
          path: assets/

      - name: Commit generated assets
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9  # v7
        with:
          commit_message: "chore(profile): refresh generated cards [skip ci]"
          file_pattern: "assets/**"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
