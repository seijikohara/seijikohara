# Verifies the generator on pull requests and main. Same zero-`uses:`
# discipline as profile.yml; dev dependencies are installed with lifecycle
# scripts disabled and only ever run under a read-only token.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Select Node.js 24 from the hosted toolcache
        run: |
          set -euo pipefail
          node_bin="$(ls -d "${RUNNER_TOOL_CACHE:-/opt/hostedtoolcache}"/node/24.*/x64/bin 2>/dev/null | sort -V | tail -n 1)"
          if [ -z "${node_bin}" ]; then
            echo "Node 24 not in toolcache; falling back to checksum-verified nodejs.org download" >&2
            cd "${RUNNER_TEMP}"
            curl -fsSLO https://nodejs.org/dist/latest-v24.x/SHASUMS256.txt
            tarball="$(grep -o 'node-v24[^ ]*-linux-x64\.tar\.xz' SHASUMS256.txt | head -n 1)"
            curl -fsSLO "https://nodejs.org/dist/latest-v24.x/${tarball}"
            grep " ${tarball}\$" SHASUMS256.txt | sha256sum -c -
            mkdir -p node24
            tar -xJf "${tarball}" -C node24 --strip-components=1
            node_bin="${RUNNER_TEMP}/node24/bin"
          fi
          "${node_bin}/node" --version
          echo "${node_bin}" >> "${GITHUB_PATH}"

      - name: Clone repository at the triggering ref
        # GITHUB_REF is refs/pull/N/merge on pull_request and refs/heads/main
        # on push, so one fetch covers both.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git init --quiet repo
          cd repo
          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth 1 origin "${GITHUB_REF}"
          git checkout --quiet FETCH_HEAD

      - name: Install pnpm (version pinned by packageManager in package.json)
        run: |
          set -euo pipefail
          pnpm_version="$(node -p "require('./repo/package.json').packageManager.split('@')[1]")"
          npm install -g "pnpm@${pnpm_version}"
          pnpm --version

      - name: Install dev dependencies (lifecycle scripts disabled)
        working-directory: repo
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        working-directory: repo
        run: pnpm run typecheck

      - name: Lint
        working-directory: repo
        run: pnpm run lint

      - name: Test
        working-directory: repo
        run: pnpm test

      - name: Badge output is up to date
        working-directory: repo
        run: |
          set -euo pipefail
          pnpm run badges
          git diff --exit-code -- assets/badges
